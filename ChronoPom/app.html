<!DOCTYPE html>
<html lang="en" ng-app="myapp">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ChronoPom - Productivity Tracker</title>

  <!-- ── Firebase SDK ── -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- ── Firebase Config ── -->
  <script>
    const firebaseConfig = {
      apiKey:            "AIzaSyDumahvfc57fJw0lgoq6vf532GGr4EAI74",
      authDomain:        "chronopom.firebaseapp.com",
      projectId:         "chronopom",
      storageBucket:     "chronopom.firebasestorage.app",
      messagingSenderId: "153816023877",
      appId:             "1:153816023877:web:0b32bb727141b1a75a742c"
    };
    firebase.initializeApp(firebaseConfig);
    const db   = firebase.firestore();
    const auth = firebase.auth();
  </script>

  <!-- ── CSS (all in css/ folder) ── -->
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/analytics.css">
  <link rel="stylesheet" href="css/progress.css">
  <link rel="stylesheet" href="css/TimertaskConnect.css">

  <!-- ── Google Fonts ── -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- ── CDN Libraries ── -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.8.3/angular.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular-route/1.8.3/angular-route.min.js"></script>

  <!-- ── App Core JS ── -->
  <script src="js/app.js"></script>

  <!-- ── Auth Guard: redirect to login if not logged in ── -->
  <script>
    (function() {
      try {
        if (localStorage.getItem('cp_loggedIn') !== 'true') {
          window.location.href = 'auth.html';
        }
      } catch(e) {}
    })();
  </script>

  <!-- ── Logout (plain JS — works independently of Angular) ── -->
  <script>
    function handleLogout() {
      try {
        localStorage.removeItem('cp_loggedIn');
        localStorage.removeItem('cp_currentUser');
      } catch(e) {}
      window.location.href = 'auth.html?logout=1';
    }
  </script>

  <style>
    .nav-user { display: flex; align-items: center; gap: 10px; margin-left: 6px; }
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, #48B3AF, #A7E399);
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 800; color: #000c31; flex-shrink: 0;
      font-family: 'Poppins', sans-serif; border: 2px solid rgba(255,255,255,0.25);
    }
    .user-name-text {
      font-size: 13px; font-weight: 500; color: #ffffff; font-family: 'Poppins', sans-serif;
      max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .logout-btn {
      display: flex; align-items: center; gap: 6px;
      background: rgba(220,38,38,0.15); border: 1.5px solid rgba(220,38,38,0.4);
      color: #ff8a8a; font-family: 'Poppins', sans-serif; font-size: 12px; font-weight: 600;
      padding: 7px 14px; border-radius: 20px; cursor: pointer; transition: all 0.2s; text-decoration: none;
    }
    .logout-btn:hover { background: rgba(220,38,38,0.35); border-color: #dc2626; color: #ffffff; transform: translateY(-1px); }
    .logout-btn i { font-size: 12px; padding: 0 !important; color: inherit !important; }
  </style>
</head>

<body ng-controller="MainController">

  <!-- ── NAVIGATION BAR ── -->
  <div class="navigation">
    <div class="image left"></div>
    <div class="right">
      <i class="fa-solid fa-clock"></i>
      <a href="#!/timer"     ng-class="{'active': currentRoute=='/timer'}">TIMER</a>
      <i class="fa-solid fa-list-check"></i>
      <a href="#!/tasks"     ng-class="{'active': currentRoute=='/tasks'}">TASKS</a>
      <i class="fa-solid fa-chart-line"></i>
      <a href="#!/analytics" ng-class="{'active': currentRoute=='/analytics'}">ANALYTICS</a>
      <i class="fa-solid fa-bars-progress"></i>
      <a href="#!/progress"  ng-class="{'active': currentRoute=='/progress'}">PROGRESS</a>

      <!-- Theme Picker -->
      <div class="colorbox">
        <div class="color" ng-click="changeColor()"><i class="fa-solid fa-palette"></i></div>
        <div class="cont" ng-show="color">
          <h2 class="themetitle">Select Your Theme</h2>
          <div class="theme-card" ng-click="unshow()" ng-class="{'active': currentTheme=='Neon Focus'}">
            <div class="theme-info">
              <h3>Neon Focus</h3><p>Dark background with glowing accents</p>
              <div class="colors">
                <span style="background:#0b1020"></span><span style="background:#e6f0ff"></span>
                <span style="background:#00d4ff"></span><span style="background:#060b1a"></span><span style="background:#ff007a"></span>
              </div>
            </div>
          </div>
          <div class="theme-card active" ng-click="unshow()" ng-class="{'active': currentTheme=='Soft Pastel Calm'}">
            <div class="theme-info">
              <h3>Soft Pastel Calm</h3><p>Light colors with rounded elements</p>
              <div class="colors">
                <span style="background:#f8f5f0"></span><span style="background:#5a5148"></span>
                <span style="background:#b8b2e6"></span><span style="background:#ffffff"></span><span style="background:#a8dadc"></span>
              </div>
            </div>
          </div>
          <div class="theme-card" ng-class="{'active': currentTheme=='Glassmorphism'}" ng-click="unshow()">
            <div class="theme-info">
              <h3>Glassmorphism</h3><p>Blurred transparent cards</p>
              <div class="colors">
                <span style="background:#0f172a"></span><span style="background:#e5e7eb"></span>
                <span style="background:#4f6df5"></span><span style="background:#f1f5f9"></span><span style="background:#7c5cff"></span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- User + Logout -->
      <div class="nav-user">
        <div class="user-avatar">{{ userInitial() }}</div>
        <span class="user-name-text">{{ currentUser.name }}</span>
        <button class="logout-btn" type="button" onclick="handleLogout()">
          <i class="fa-solid fa-right-from-bracket"></i> Logout
        </button>
      </div>
    </div>
  </div>

  <!-- ── PAGE CONTENT (Angular route injects HTML here) ── -->
  <div ng-view></div>

  <!-- ── App Logic JS ── -->
  <script src="js/anConncetion.js"></script>
  <script src="js/progress.js"></script>

</body>
</html>
